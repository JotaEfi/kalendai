# ============================================================
# KalendAI — Ambiente LOCAL de Desenvolvimento (hot-reload)
#
# Uso: docker compose -f docker-compose.local.yml up
#
# Serviços:
#   http://localhost:5173   → Frontend React (Vite dev server)
#   http://localhost:3001   → Backend API (tsx watch)
#   http://localhost:9000   → MinIO S3 API
#   http://localhost:9001   → MinIO Console (admin UI)
#   localhost:5432          → PostgreSQL
#
# Notas:
#   - O código-fonte é montado em volume (hot-reload automático)
#   - Mudanças em backend/src/ → backend reinicia sozinho
#   - Mudanças em frontend/src/ → browser atualiza sozinho (HMR)
#   - Use .env.local para variáveis locais (não commite!)
# ============================================================



services:

  # ── PostgreSQL com pgvector ───────────────────────────────
  postgres:
    image: ankane/pgvector:latest
    container_name: kalendai_postgres_local
    environment:
      POSTGRES_DB: kalendai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - kalendai_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (armazenamento de objetos local) ────────────────
  minio:
    image: minio/minio:latest
    container_name: kalendai_minio_local
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"  # API S3
      - "9001:9001"  # Console web (admin)
    volumes:
      - minio_local_data:/data
    networks:
      - kalendai_local
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (Node.js com tsx watch = hot-reload) ──────
  backend:
    image: node:20
    container_name: kalendai_backend_local
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npx tsx seed.ts && npm run dev"
    environment:
      DATABASE_URL: postgresql://postgres:localpass@postgres:5432/kalendai?sslmode=disable&connection_limit=10&pool_timeout=10&connect_timeout=10
      JWT_SECRET: ${JWT_SECRET:-local-jwt-secret-dev}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-local-refresh-secret-dev}
      REFRESH_TOKEN_EXPIRES_IN: 7d
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-kalend-ai-images}
      MINIO_PUBLIC_URL: http://localhost:9000
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      PORT: 3001
      NODE_ENV: development
      TIMEZONE: ${TIMEZONE:-America/Sao_Paulo}
      DISABLE_WEEKENDS: ${DISABLE_WEEKENDS:-false}
      MAX_ATTACHMENT_SIZE_MB: ${MAX_ATTACHMENT_SIZE_MB:-20}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador Local}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    volumes:
      # Monta o código-fonte para hot-reload
      - ./backend:/app
      # Evita sobrescrever node_modules do container
      - /app/node_modules
      - uploads_local_data:/app/uploads
    networks:
      - kalendai_local
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  # ── Frontend (Vite dev server com HMR) ───────────────────
  frontend:
    image: node:20-alpine
    container_name: kalendai_frontend_local
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:3001
      BACKEND_URL: http://backend:3001
    ports:
      - "5173:3000"
    volumes:
      # Monta o código-fonte para HMR
      - ./frontend:/app
      # Evita sobrescrever node_modules do container
      - /app/node_modules
    networks:
      - kalendai_local
    depends_on:
      - backend

networks:
  kalendai_local:
    driver: bridge

volumes:
  postgres_local_data:
  minio_local_data:
  uploads_local_data:
