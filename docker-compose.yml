version: "3.9"
services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: kalend_ai
      POSTGRES_USER: kalend_user
      POSTGRES_PASSWORD: kalend_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - network_swarm_public
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sua_access_key}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-sua_secret_key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - network_swarm_public
    command: server /data --console-address ":9001"
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - uploads_data:/app/uploads
    networks:
      - network_swarm_public
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - network_swarm_public
    restart: unless-stopped

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public

volumes:
  postgres_data:
  uploads_data:
  minio_data:

