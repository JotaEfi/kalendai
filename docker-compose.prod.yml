version: "3.9"

# ============================================================
# KalendAI — Stack de Produção (apenas backend + frontend)
#
# Dependências externas (já rodando na VPS):
#   - PostgreSQL: pgvector_postgres (rede network_swarm_public)
#   - MinIO: https://s3.excellenceestudio.com.br
#
# Deploy: docker stack deploy -c docker-compose.prod.yml kalendai
# ============================================================

services:

  # ── Backend API ──────────────────────────────────────────
  backend:
    image: ${DOCKER_USERNAME:-jotaefi107}/kalendai-backend:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN: 7d
      # MinIO externo (HTTPS) — usado pelo backend para uploads/downloads
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-https://s3.excellenceestudio.com.br}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-kalend-ai-images}
      # URL pública para geração de presigned URLs (acesso pelo browser)
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://s3.excellenceestudio.com.br}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      AI_BASE_URL: ${AI_BASE_URL}
      PORT: 3001
      NODE_ENV: production
      TIMEZONE: ${TIMEZONE:-America/Sao_Paulo}
      DISABLE_WEEKENDS: ${DISABLE_WEEKENDS:-false}
      MAX_ATTACHMENT_SIZE_MB: ${MAX_ATTACHMENT_SIZE_MB:-20}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - uploads_prod_data:/app/uploads
    networks:
      - network_swarm_public
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Frontend (Nginx + React) ──────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME:-jotaefi107}/kalendai-frontend:latest
    depends_on:
      - backend
    networks:
      - network_swarm_public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kalendai.rule=Host(`kalendai.excellenceestudio.com.br`)"
      - "traefik.http.routers.kalendai.entrypoints=web,websecure"
      - "traefik.http.routers.kalendai.tls=true"
      - "traefik.http.routers.kalendai.tls.certresolver=letsencrypt"
      - "traefik.http.services.kalendai.loadbalancer.server.port=80"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.kalendai.rule=Host(`kalendai.excellenceestudio.com.br`)"
        - "traefik.http.routers.kalendai.entrypoints=web,websecure"
        - "traefik.http.routers.kalendai.tls=true"
        - "traefik.http.routers.kalendai.tls.certresolver=letsencrypt"
        - "traefik.http.services.kalendai.loadbalancer.server.port=80"

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public

volumes:
  uploads_prod_data:
